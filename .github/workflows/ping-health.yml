name: Ping Health

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: ping-health
      cancel-in-progress: true

    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://ruby-on-rails-qst6.onrender.com/health
        run: |
          set -euo pipefail

          echo "Pinging: ${HEALTH_URL}"
          body="$(curl -fsSL --max-time 20 --retry 3 --retry-all-errors "${HEALTH_URL}")"
          echo "${body}"

          python3 - <<'PY' <<<"${body}"
          import json
          import sys

          body = sys.stdin.read().strip()

          try:
            data = json.loads(body)
          except Exception as e:
            raise SystemExit(f"Invalid JSON response: {e}")

          if data.get("status") != "ok":
            raise SystemExit(f"Unexpected status: {data.get('status')!r}")

          if data.get("database") != "connected":
            raise SystemExit(f"Unexpected database status: {data.get('database')!r}")

          print("Health check OK")
          PY
