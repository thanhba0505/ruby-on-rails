name: Deploy to Render

run-name: "Deploy: ${{ github.ref_name }} - ${{ github.event.head_commit.message }}"

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production

    timeout-minutes: 20

    concurrency:
      group: deploy-render
      cancel-in-progress: true

    env:
      RENDER_API_BASE: https://api.render.com/v1
      POLL_INTERVAL_SECONDS: 10
      MAX_POLLS: 90

    steps:
      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "Triggering Render deploy..."

          response=$(curl -fsSL -X POST \
            "${RENDER_API_BASE}/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json")

          echo "Response: $response"

          deploy_id=$(echo "$response" | jq -r '.id')

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "Failed to get deploy ID"
            exit 1
          fi

          echo "DEPLOY_ID=$deploy_id" >> $GITHUB_ENV
          echo "Deploy ID: $deploy_id"

      - name: Poll deploy status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "Waiting Render deploy status..."

          for ((i=1; i<=MAX_POLLS; i++)); do
            response=$(curl -fsSL \
              "${RENDER_API_BASE}/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")

            status=$(echo "$response" | jq -r '.status')

            echo "Attempt ${i}/${MAX_POLLS} - Status: ${status}"

            case "$status" in
              live)
                echo "Deploy SUCCESS"
                exit 0
                ;;
              failed|canceled)
                echo "Deploy FAILED"
                echo "$response"
                exit 1
                ;;
            esac

            sleep "$POLL_INTERVAL_SECONDS"
          done

          echo "Timed out waiting for Render deploy"
          exit 1
